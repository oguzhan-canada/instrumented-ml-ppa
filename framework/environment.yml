# PPA Framework Extension — Conda Environment (v2)
# Updated: 2026-05-06 for Phase 0 extension
# Usage: conda env create -f environment.yml
# Then: pip install -r requirements_extension.txt \
#         --extra-index-url https://download.pytorch.org/whl/cpu \
#         --find-links https://data.pyg.org/whl/torch-2.5.0+cpu.html
name: ppa-ext
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=23.0

  # Build tools (for ORFS v3.0 compilation)
  - gcc_linux-64>=12
  - gxx_linux-64>=12
  - cmake>=3.24
  - make
  - git
  - wget
  - unzip

  # OpenROAD system deps
  - tcl>=8.6
  - tk>=8.6
  - swig>=4.0
  - boost-cpp>=1.80
  - eigen>=3.4
  - zlib
  - bzip2
  - lemon>=1.3.1

  - pip:
    - -r requirements_extension.txt
    - --extra-index-url https://download.pytorch.org/whl/cpu
    - --find-links https://data.pyg.org/whl/torch-2.5.0+cpu.html
